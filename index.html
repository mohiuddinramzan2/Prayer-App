<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="নামাজের সময়সূচী ও কিবলা নির্দেশক" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <title>নামাজের সময় 🕌</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <h1 class="app-title">নামাজের সময়</h1>
    <p class="location-label">📍 <span id="locationName">লোকেশন লোড হচ্ছে...</span></p>
  </header>

  <!-- ── Clock Card ── -->
  <section class="clock-card">
    <div class="clock" id="clock">০০:০০:০০</div>
    <div class="date" id="dateDisplay"></div>

    <div class="next-prayer" id="nextPrayerBox">
      <span class="next-icon" id="nextIcon">🕌</span>
      <span id="nextPrayerText">লোড হচ্ছে...</span>
    </div>

    <div class="error-msg" id="errorMsg" style="display:none"></div>
  </section>

  <!-- ── Tabs ── -->
  <nav class="tabs">
    <button class="tab-btn active" id="tabPrayer" onclick="switchTab('prayer')">
      🕌 নামাজের সময়
    </button>
    <button class="tab-btn" id="tabQibla" onclick="switchTab('qibla')">
      🧭 কিবলা
    </button>
  </nav>

  <!-- ── Prayer Times Panel ── -->
  <section class="panel" id="panelPrayer">
    <div class="prayer-list" id="prayerList">
      <div class="loading">⏳ সময় গণনা হচ্ছে...</div>
    </div>
  </section>

  <!-- ── Qibla Panel ── -->
  <section class="panel hidden" id="panelQibla">
    <div class="qibla-card">
      <p class="qibla-subtitle">মক্কা মুকাররমা — সোনালি তীর কিবলার দিক</p>

      <div class="compass-wrap">
        <!-- Compass ring -->
        <svg class="compass-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#c9a84c"/>
              <stop offset="100%" stop-color="#8b6914"/>
            </linearGradient>
          </defs>
          <circle cx="110" cy="110" r="106" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"/>
          <circle cx="110" cy="110" r="98" fill="rgba(0,0,0,0.35)"/>
          <!-- Cardinal labels -->
          <text x="110" y="28"  text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">উ</text>
          <text x="192" y="115" text-anchor="middle" fill="#667788" font-size="13">পূ</text>
          <text x="110" y="200" text-anchor="middle" fill="#667788" font-size="13">দ</text>
          <text x="28"  y="115" text-anchor="middle" fill="#667788" font-size="13">প</text>
          <!-- Tick marks -->
          <g id="ticks"></g>
        </svg>

        <!-- Needle (rotates) -->
        <div class="needle-wrap" id="needleWrap">
          <svg class="needle-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="needleGold" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#f0d060"/>
                <stop offset="100%" stop-color="#c9a84c"/>
              </linearGradient>
            </defs>
            <polygon points="110,18 116,110 110,106 104,110" fill="url(#needleGold)"/>
            <polygon points="110,202 116,110 110,114 104,110" fill="rgba(50,50,50,0.6)"/>
            <circle cx="110" cy="110" r="8" fill="#c9a84c"/>
            <circle cx="110" cy="110" r="4" fill="#1a0a00"/>
            <text x="110" y="36" text-anchor="middle" font-size="16">🕋</text>
          </svg>
        </div>
      </div>

      <div class="qibla-degree" id="qiblaDegree">— °</div>
      <div class="coords" id="coordsDisplay"></div>
      <p class="qibla-tip">ফোন সমতল রেখে সোনালি তীরের দিকে মুখ করুন</p>
      <div class="arabic-text">اللَّهُ أَكْبَرُ</div>
    </div>
  </section>

  <!-- ── Footer ── -->
  <footer class="footer">
    নামাজের সময় আপনার অবস্থান অনুযায়ী গণনা করা হয়েছে
  </footer>

  <script src="js/prayer.js"></script>
  <script src="js/qibla.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
